<!DOCTYPE html>
<html>
<head>
    <title>Nina&NiklasPage</title>

    <style>
        body {
            background: linear-gradient(270deg, #ff4d4d, #000000, #ff1a1a);
            background-size: 600% 600%;
            animation: moveBackground 10s ease infinite;

            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 150px;
            text-shadow: 0px 0px 10px rgba(0,0,0,0.8);
        }

        @keyframes moveBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #ff4d4d;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        button:hover {
            background: #ff1a1a;
            transform: scale(1.1);
        }

        #result {
            margin-top: 30px;
            font-size: 30px;
            opacity: 0;
            transition: 0.5s;
        }

        .show {
            opacity: 1;
            transform: scale(1.2);
        }
    </style>
</head>

<body>

    <h1>Hi Baby 😏</h1>
    <p>Traust du dich?</p>

    <h3>Ja oder Nein?</h3>

    <button onclick="answer('ja')">Ja</button>
    <button onclick="answer('nein')">Nein</button>

    <h2 id="result"></h2>

    <script>
        function answer(choice) {

            let text = "";

            if (choice === "ja") {
                text = "Nice 😏 ich wusste es";
            } else {
                text = "Schade, dann schick Füßi Fotos😅 ";
            }

            let result = document.getElementById("result");
            result.innerText = text;

            result.classList.remove("show");
            void result.offsetWidth;
            result.classList.add("show");
        }
    </script>

</body>
</html>
