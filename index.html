<!DOCTYPE html>
<html>
<head>
    <title>Nina & Niklas Page</title>

    <style>
        body {
            background: linear-gradient(270deg, #ff4d4d, #000000, #ff1a1a);
            background-size: 600% 600%;
            animation: moveBackground 10s ease infinite;

            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 150px;
            text-shadow: 0px 0px 10px rgba(0,0,0,0.8);
        }

        @keyframes moveBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #ff4d4d;
            color: white;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #ff1a1a;
            transform: scale(1.1);
        }

           #result {
    margin-top: 30px;
    font-size: 30px;
    opacity: 0;
    transition: 0.5s;
    color: white;
}

        .show {
            opacity: 1;
            transform: scale(1.2);
        }

        #choiceButtons {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>Hi BABY 😏</h1>

    <!-- STEP 1 -->
    <button onclick="start()">Drück mich</button>

    <h2 id="invite"></h2>

    <!-- STEP 2 -->
    <div id="choiceButtons">
        <h3>Ja oder Nein?</h3>
        <button onclick="answer('ja')">Ja</button>
        <button onclick="answer('nein')">Nein</button>
    </div>

    <!-- RESULT -->
    <h2 id="result"></h2>

    <script>

function start() {
    document.getElementById("invite").innerText = "Komm heute zu mir 😏";
    document.getElementById("choiceButtons").style.display = "block";
}

function answer(choice) {

    let text = "";

    if (choice === "ja") {
        text = "Supi, bis gleich 😏";
    } else {
        text = "Schade, dann schick Füßi Fotos 😅";
    }

    let result = document.getElementById("result");

    result.innerText = text;

    result.style.opacity = "1";

    result.classList.remove("show");
    void result.offsetWidth;
    result.classList.add("show");
}
</script>

</body>
</html>
